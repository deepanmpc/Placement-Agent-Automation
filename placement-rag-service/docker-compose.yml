version: '3.8'

services:
  rag-service:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - RAG_QDRANT_HOST=qdrant
      - RAG_QDRANT_PORT=6333
      - RAG_DATABASE_URL=mysql+aiomysql://root:15713007@host.docker.internal:3306/placement_agent

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
