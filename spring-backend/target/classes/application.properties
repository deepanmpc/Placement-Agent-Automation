# ─────────────────────────────────────────────────────────
# Placement Agent Backend – Application Configuration
# ─────────────────────────────────────────────────────────

spring.application.name=placement-backend
server.port=9090

# ─── MySQL ───────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/placement_agent?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:15713007}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JWT ─────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:PlacementAgentSuperSecretKey2026!@#$%^&*()_+ABCDEFGHIJKLMNOP}
jwt.expiration-ms=${JWT_EXPIRATION:3600000}

# ─── CORS ────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ─── Scheduler ───────────────────────────────────────────
scheduler.snapshot-retention-days=${SNAPSHOT_RETENTION_DAYS:365}
scheduler.audit-retention-days=${AUDIT_RETENTION_DAYS:180}

# ─── Admin Seed ──────────────────────────────────────────
admin.default.username=${ADMIN_USERNAME:admin}
admin.default.password=${ADMIN_PASSWORD:Mpc@99949}

# ─── Actuator ────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
