<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Agent — Resume Parser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: #94a3b8; font-size: 0.875rem; margin-bottom: 2rem; }
  .card {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 2rem; width: 100%; max-width: 640px;
  }
  .upload-area {
    border: 2px dashed #475569; border-radius: 8px; padding: 2.5rem 1rem;
    text-align: center; cursor: pointer; transition: all .2s;
  }
  .upload-area:hover, .upload-area.dragover { border-color: #3b82f6; background: #1e3a5f30; }
  .upload-area.has-file { border-color: #22c55e; border-style: solid; }
  .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .upload-label { color: #94a3b8; font-size: 0.875rem; }
  .file-name { color: #22c55e; font-weight: 500; margin-top: 0.5rem; }
  input[type="file"] { display: none; }
  button {
    margin-top: 1rem; width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
    font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  button.primary { background: #3b82f6; color: #fff; }
  button.primary:hover { background: #2563eb; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff3;
    border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .output { margin-top: 1.5rem; }
  .output-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.75rem;
  }
  .output-header h2 { font-size: 1rem; font-weight: 600; }
  .output-actions { display: flex; gap: 0.5rem; }
  .output-actions button {
    width: auto; padding: 0.35rem 0.75rem; margin: 0; font-size: 0.75rem;
  }
  pre {
    background: #0f172a; border: 1px solid #334155; border-radius: 8px;
    padding: 1rem; overflow-x: auto; font-size: 0.8rem; line-height: 1.5;
    max-height: 70vh; white-space: pre-wrap; word-break: break-word;
  }
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #22c55e; color: #052e16; padding: 0.5rem 1.25rem;
    border-radius: 8px; font-size: 0.8rem; font-weight: 500;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .error { color: #f87171; margin-top: 0.75rem; font-size: 0.85rem; }
</style>
</head>
<body>

<h1>📄 Placement Agent</h1>
<p class="subtitle">Upload a resume to parse it into structured JSON</p>

<div class="card">
  <div class="upload-area" id="dropZone">
    <div class="upload-icon">☁️</div>
    <div class="upload-label">Drop your resume here or click to browse</div>
    <div class="file-name" id="fileName"></div>
    <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md">
  </div>

  <button class="primary" id="parseBtn" disabled>Parse Resume</button>
  <div class="error" id="errorMsg"></div>
</div>

<div class="output" id="outputSection" style="display:none">
  <div class="card">
    <div class="output-header">
      <h2>📋 Parsed Output</h2>
      <div class="output-actions">
        <button id="copyBtn">📋 Copy</button>
        <button id="collapseBtn">🔽 Collapse</button>
      </div>
    </div>
    <pre id="jsonOutput"></pre>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const parseBtn = document.getElementById('parseBtn');
const errorMsg = document.getElementById('errorMsg');
const outputSection = document.getElementById('outputSection');
const jsonOutput = document.getElementById('jsonOutput');
const copyBtn = document.getElementById('copyBtn');
const collapseBtn = document.getElementById('collapseBtn');
const toast = document.getElementById('toast');

let collapsed = false;
let currentJson = '';

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
  handleFile();
});

fileInput.addEventListener('change', handleFile);

function handleFile() {
  const file = fileInput.files[0];
  if (!file) { resetUpload(); return; }

  const valid = ['.pdf', '.docx', '.txt', '.md'];
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!valid.includes(ext)) {
    errorMsg.textContent = 'Unsupported format. Use PDF, DOCX, TXT, or MD.';
    resetUpload();
    return;
  }

  errorMsg.textContent = '';
  fileName.textContent = '📎 ' + file.name;
  dropZone.classList.add('has-file');
  parseBtn.disabled = false;
}

function resetUpload() {
  fileName.textContent = '';
  dropZone.classList.remove('has-file');
  parseBtn.disabled = true;
}

parseBtn.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) return;

  parseBtn.disabled = true;
  parseBtn.innerHTML = '<span class="spinner"></span>Parsing...';
  errorMsg.textContent = '';
  outputSection.style.display = 'none';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('http://localhost:8000/upload', { method: 'POST', body: formData });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || `HTTP ${res.status}`);
    }
    const data = await res.json();
    currentJson = JSON.stringify(data, null, 2);
    jsonOutput.textContent = currentJson;
    outputSection.style.display = 'block';
  } catch (err) {
    errorMsg.textContent = 'Error: ' + err.message;
  } finally {
    parseBtn.innerHTML = 'Parse Resume';
    parseBtn.disabled = false;
  }
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(currentJson);
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
});

collapseBtn.addEventListener('click', () => {
  collapsed = !collapsed;
  if (collapsed) {
    const data = JSON.parse(currentJson);
    const summary = { name: data.personal_info?.name, email: data.personal_info?.email, skills_count: Object.values(data.skills || {}).flat().length, projects: (data.projects || []).length, sections: Object.keys(data) };
    jsonOutput.textContent = JSON.stringify(summary, null, 2);
    collapseBtn.textContent = '🔽 Expand';
  } else {
    jsonOutput.textContent = currentJson;
    collapseBtn.textContent = '🔽 Collapse';
  }
});
</script>

</body>
</html>
